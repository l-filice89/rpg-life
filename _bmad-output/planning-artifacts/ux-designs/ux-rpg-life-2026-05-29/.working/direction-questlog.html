<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest Log — Quest Board Direction</title>
  <!--
    Quest Log leans into game UI clarity: condensed bold headers, card-framed rows,
    and high-contrast chips make scanning feel like reading an active mission list
    from a tabletop RPG session — fast, loud, and unambiguous.
  -->
  <style>
    /* Palette: slate bg #1A2332, panel #243044, card #2D3A50, text #E8EDF5, accent gold #F0B429, XP #3DD68C, Focus #5B9CF5, overdue #8899AA */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F1419;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .phone {
      width: 390px;
      min-height: 780px;
      background: #1A2332;
      border-radius: 28px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 14px 16px 16px;
      background: #243044;
      border-bottom: 3px solid #F0B429;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .hamburger {
      width: 40px;
      height: 40px;
      border: 2px solid #3D4F66;
      border-radius: 8px;
      background: #2D3A50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
    }
    .hamburger span {
      display: block;
      width: 18px;
      height: 2px;
      background: #F0B429;
      border-radius: 1px;
    }
    .header-title {
      flex: 1;
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #F0B429;
    }
    .hero-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-badge {
      font-size: 13px;
      font-weight: 800;
      color: #1A2332;
      background: #F0B429;
      padding: 6px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .xp-block { flex: 1; }
    .xp-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8899AA;
      margin-bottom: 4px;
    }
    .xp-track {
      height: 10px;
      background: #1A2332;
      border-radius: 5px;
      border: 1px solid #3D4F66;
      overflow: hidden;
    }
    .xp-fill {
      width: 62%;
      height: 100%;
      background: linear-gradient(90deg, #2A9D6E, #3DD68C);
      border-radius: 4px;
    }
    .focus-pill {
      font-size: 13px;
      font-weight: 800;
      color: #5B9CF5;
      background: rgba(91, 156, 245, 0.15);
      border: 2px solid #5B9CF5;
      padding: 6px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }
    .content {
      flex: 1;
      padding: 16px 16px 96px;
      overflow-y: auto;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8899AA;
    }
    .section-count {
      font-size: 11px;
      font-weight: 700;
      color: #8899AA;
      background: #243044;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid #3D4F66;
    }
    .quest-card {
      background: #2D3A50;
      border: 2px solid #3D4F66;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .quest-card.overdue {
      border-color: #8899AA;
      border-left: 4px solid #8899AA;
    }
    .checkbox {
      width: 26px;
      height: 26px;
      border: 2px solid #F0B429;
      border-radius: 6px;
      flex-shrink: 0;
      background: #243044;
    }
    .quest-body { flex: 1; min-width: 0; }
    .quest-title {
      font-size: 15px;
      font-weight: 700;
      color: #E8EDF5;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .quest-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .badge-neutral {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #C8D4E0;
      background: #243044;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid #8899AA;
    }
    .skill-chip {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #1A2332;
      background: #F0B429;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .due {
      font-size: 10px;
      font-weight: 700;
      color: #3DD68C;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .section-gap { margin-top: 20px; }
    .fab {
      position: absolute;
      bottom: 24px;
      right: 20px;
      width: 58px;
      height: 58px;
      border-radius: 12px;
      background: #F0B429;
      color: #1A2332;
      border: none;
      font-size: 32px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(240, 180, 41, 0.4);
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="phone">
    <header class="header">
      <div class="header-top">
        <button class="hamburger" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
        <h1 class="header-title">Quest Board</h1>
      </div>
      <div class="hero-block">
        <span class="hero-badge">Hero Lv 4</span>
        <div class="xp-block">
          <div class="xp-label">XP to Lv 5</div>
          <div class="xp-track"><div class="xp-fill"></div></div>
        </div>
        <span class="focus-pill">⚡ 2/5</span>
      </div>
    </header>

    <main class="content">
      <div class="section-head">
        <span class="section-title">Replan queue</span>
        <span class="section-count">1</span>
      </div>

      <article class="quest-card overdue">
        <div class="checkbox"></div>
        <div class="quest-body">
          <h2 class="quest-title">Reply to landlord</h2>
          <div class="quest-meta">
            <span class="badge-neutral">Past due · May 27</span>
            <span class="skill-chip">Presence</span>
            <span class="skill-chip">Order</span>
          </div>
        </div>
      </article>

      <div class="section-head section-gap">
        <span class="section-title">Active quests</span>
        <span class="section-count">2</span>
      </div>

      <article class="quest-card">
        <div class="checkbox"></div>
        <div class="quest-body">
          <h2 class="quest-title">Finish portfolio draft</h2>
          <div class="quest-meta">
            <span class="due">Due May 30</span>
            <span class="skill-chip">Craft</span>
            <span class="skill-chip">Lore</span>
          </div>
        </div>
      </article>

      <article class="quest-card">
        <div class="checkbox"></div>
        <div class="quest-body">
          <h2 class="quest-title">Morning run — 20 min</h2>
          <div class="quest-meta">
            <span class="skill-chip">Vitality</span>
          </div>
        </div>
      </article>
    </main>

    <button class="fab" aria-label="Create quest">+</button>
  </div>
</body>
</html>
