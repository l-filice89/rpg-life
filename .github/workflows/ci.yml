name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun turbo type-check

      - name: Lint
        run: bun turbo lint

      - name: Dependency audit
        run: bun pm audit
        continue-on-error: true

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/ci-test.db
      BETTER_AUTH_SECRET: ci-test-secret-must-be-at-least-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: onboarding@resend.dev
      API_URL: http://localhost:3002
      WEB_URL: http://localhost:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare SQLite data directory
        run: mkdir -p data

      - name: Run smoke tests
        run: bun run smoke

      - name: Run tests with coverage
        run: |
          set -o pipefail
          bun test --coverage packages/domain/src packages/api/src packages/db/src apps/web/src/lib 2>&1 | tee /tmp/coverage.txt
          LINE_COV=$(awk '/^All files/ {print $6}' /tmp/coverage.txt)
          if [ -z "$LINE_COV" ]; then
            echo "❌ Could not parse line coverage from bun output"
            exit 1
          fi
          echo "Line coverage: ${LINE_COV}%"
          if awk "BEGIN { exit !(${LINE_COV} < 70) }"; then
            echo "❌ Line coverage ${LINE_COV}% is below the required 70% threshold"
            exit 1
          fi
          echo "✅ Line coverage ${LINE_COV}% meets the 70% threshold"

      - name: Check migrations
        run: bunx drizzle-kit check
        working-directory: packages/db

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun turbo build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test]
    env:
      DATABASE_URL: file:/data/rpg-life.db
      BETTER_AUTH_SECRET: ci-e2e-secret-must-be-at-least-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: onboarding@resend.dev
      API_URL: http://localhost:3002
      WEB_URL: http://localhost:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Start services via Docker Compose
        run: |
          mkdir -p data
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3002/health && curl -sf http://localhost:3000/api/trpc/health; then
              echo "Services ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 3
            if [ "$i" -eq 30 ]; then
              echo "❌ Services did not become healthy after 90 seconds"
              exit 1
            fi
          done

      - name: Run Playwright E2E
        run: bunx playwright test --reporter=github
        working-directory: apps/web
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, test, build, e2e]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.quality.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.e2e.result }}" != "success" ]]; then
            echo "One or more CI jobs did not succeed (failed, cancelled, or skipped)"
            exit 1
          fi
          echo "All CI jobs passed"
