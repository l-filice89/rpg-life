name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun turbo type-check

      - name: Lint
        run: bun turbo lint

      - name: Dependency audit
        run: bun pm audit
        continue-on-error: true

  test:
    name: Test & Smoke
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/ci-test.db
      BETTER_AUTH_SECRET: ci-test-secret-must-be-at-least-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: onboarding@resend.dev
      API_URL: http://localhost:3002
      WEB_URL: http://localhost:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare SQLite data directory
        run: mkdir -p data

      - name: Run smoke tests
        run: bun run smoke

      - name: Check migrations
        run: bunx drizzle-kit check
        working-directory: packages/db

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, test]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.quality.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
