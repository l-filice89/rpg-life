version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      trpc:
        patterns:
          - '@trpc/*'
          - 'trpc*'
      drizzle:
        patterns:
          - 'drizzle-*'
      types:
        patterns:
          - '@types/*'
          - 'bun-types'
      linting:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'prettier*'
      testing:
        patterns:
          - '@playwright/*'
          - 'playwright*'
      auth:
        patterns:
          - 'better-auth*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
          - 'next'
    ignore:
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'zod'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint-plugin-boundaries'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
